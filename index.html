---
layout: default
title: Barr Code
---

<ul>
  {% for post in site.posts limit: 5 %}
  <li>
    <small>{{ post.date | date_to_string }}</small>
    <p>
      <a href="{{ post.url }}">{{ post.title }}</a>
      <span class="meta">{{ post.tags | array_to_sentence_string }}</span>
    </p>
  </li>
  {% endfor %}
</ul>
