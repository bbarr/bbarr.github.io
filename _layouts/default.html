<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width">
    <title>barrcode - {{ page.title }}</title>

    <!-- Custom CSS -->
    <link href='http://fonts.googleapis.com/css?family=Lato:400,700' rel='stylesheet' type='text/css'>
    <link href="/base.css" rel="stylesheet"></link>

  </head>
  <body>


    <header>
      <h1><a href="/">barrcode</a></h1>
      <nav>
        <a target="_blank" href="https://github.com/bbarr">github</a>
        <a target="_blank" href="https://linkedin.com/pub/brendan-barr/70/366/155">linkedin</a>
        <!--<a target="_blank" href="http://codepen.io/bbarr">codepen</a>-->
      </nav>
    </header>

    <section>
      {% if page.category %}
      <div id="post">
        <h2> 
          {{ page.title }} 
          <span class="meta">
            Published on {{ page.date | date: "%-m/%d/%y" }} about {{ page.tags | array_to_sentence_string }}
          </span>
        </h2>
        {{ content }}
      </div>
      {% else %}
      <div id="history">
        {{ content }}
      </div>
      {% endif %}
    </section>

    <footer>
      <a href="/feed.xml">RSS</a>
    </footer>

  </body>
</html>
